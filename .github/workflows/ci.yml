name: Academy CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OPA
        run: |
          curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Run OPA tests
        run: |
          opa test compliance-as-code/gdpr/article32 -v
          opa test compliance-as-code/gdpr/article25 -v
          opa test compliance-as-code/dora -v

      - name: Markdown lint
        run: |
          npx --yes markdownlint-cli@0.39.0 "**/*.md" --config .markdownlint.json --ignore .git --ignore node_modules

      - name: Validate local Markdown links
        run: |
          python3 scripts/check_markdown_links.py .
